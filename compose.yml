services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/onion_hono
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onion_hono
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onion_hono"]
      interval: 5s
      timeout: 5s
      retries: 5

  mail:
    image: axllent/mailpit:v1.30
    ports:
      - "1025:1025" # SMTPサーバー（プログラムからメールを送るポート）
      - "8025:8025" # WEB管理画面（ブラウザでメールを確認するポート）
    environment:
      - MP_MAX_MESSAGES=100

volumes:
  postgres_data:
